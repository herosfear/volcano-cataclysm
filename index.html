<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volcano Cataclysm V10</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #0b1116; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #1a2a3a; margin: 0 auto; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #msg { position: absolute; bottom: 120px; width: 100%; text-align: center; color: #ffae00; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px;">Gold: <span id="goldDisp">500</span></div>
        <div style="color: #ff4500;">Heat: <span id="heatDisp">0</span>%</div>
    </div>
    <div id="msg">DRAG MONKEYS TO DEFEND THE PATH</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const spriteSheet = new Image();
spriteSheet.src = 'v10_volcano_master_atlas.PNG'; 

// --- Game Logic Variables ---
let gold = 500;
let heat = 0;
let frameCount = 0;
let towers = [];
let enemies = [];
let selectedTower = null;
let isPlacementValid = true;

// --- Level Path ---
const path = [
    {x: -50, y: 200}, {x: 250, y: 200}, 
    {x: 250, y: 500}, {x: 600, y: 500}
];

// --- Sprite Slicing Map ---
const sprites = {
    devil: { sx: 5, sy: 50, sw: 95, sh: 85, frames: 6, cost: 250, range: 150 },
    dart:  { sx: 5, sy: 200, sw: 75, sh: 85, frames: 4, cost: 50, range: 100 },
    ice:   { sx: 290, sy: 200, sw: 75, sh: 85, frames: 4, cost: 150, range: 80 }
};

const shopItems = [
    { ...sprites.devil, type: 'devil' },
    { ...sprites.dart, type: 'dart' },
    { ...sprites.ice, type: 'ice' }
];

// --- Physics & Collision ---
function distToSegment(p, v, w) {
    let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.distance(p, v);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2));
}

function checkPlacement(x, y) {
    for (let i = 0; i < path.length - 1; i++) {
        if (distToSegment({x, y}, path[i], path[i+1]) < 45) return false;
    }
    return y < canvas.height - 110;
}

// --- Fixed Input Handling ---
canvas.addEventListener('touchstart', (e) => {
    // 1. Force the game to start if it hasn't yet
    if (gameState === "START") {
        gameState = "PLAYING";
        document.getElementById('msg').style.display = 'none';
        return; // Stop here so we don't accidentally buy a tower on the first tap
    }

    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;

    // 2. Shop Interaction
    if (ty > canvas.height - 100) {
        let index = Math.floor(tx / (canvas.width / 3));
        if (shopItems[index] && gold >= shopItems[index].cost) {
            selectedTower = { ...shopItems[index], x: tx - 40, y: ty - 40 };
        }
    }
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
    if (selectedTower) {
        selectedTower.x = e.touches[0].clientX - 40;
        selectedTower.y = e.touches[0].clientY - 40;
        isPlacementValid = checkPlacement(selectedTower.x + 40, selectedTower.y + 40);
    }
}, {passive: false});

canvas.addEventListener('touchend', () => {
    if (selectedTower && isPlacementValid) {
        gold -= selectedTower.cost;
        towers.push({ ...selectedTower });
    }
    selectedTower = null;
});

// --- Core Loop Functions ---
function update() {
    frameCount++;
    if (frameCount % 60 === 0) spawnEnemy();
    
    enemies.forEach((en, i) => {
        let target = path[en.pIdx + 1];
        if (!target) { enemies.splice(i, 1); heat += 2; return; }
        let dx = target.x - en.x;
        let dy = target.y - en.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 5) en.pIdx++;
        else { en.x += (dx/dist) * 2; en.y += (dy/dist) * 2; }
    });

    document.getElementById('goldDisp').innerText = gold;
    document.getElementById('heatDisp').innerText = Math.floor(heat);
}

function spawnEnemy() {
    enemies.push({ x: path[0].x, y: path[0].y, pIdx: 0 });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Terrain Path
    ctx.strokeStyle = "#3d2b1f";
    ctx.lineWidth = 50;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();

    // Draw Towers
    towers.forEach(t => {
        let frame = Math.floor(frameCount / 10) % t.frames;
        ctx.drawImage(spriteSheet, t.sx + (frame * 96), t.sy, t.sw, t.sh, t.x, t.y, 80, 80);
    });

    // Draw Enemies (Bloons)
    enemies.forEach(en => {
        ctx.drawImage(spriteSheet, 0, 625, 120, 100, en.x - 40, en.y - 40, 80, 70);
    });

    // Dragging Logic
    if (selectedTower) {
        ctx.beginPath();
        ctx.arc(selectedTower.x + 40, selectedTower.y + 40, selectedTower.range, 0, Math.PI*2);
        ctx.fillStyle = isPlacementValid ? "rgba(0,255,0,0.2)" : "rgba(255,0,0,0.3)";
        ctx.fill();
        ctx.drawImage(spriteSheet, selectedTower.sx, selectedTower.sy, selectedTower.sw, selectedTower.sh, selectedTower.x, selectedTower.y, 80, 80);
    }

    // Shop UI
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    shopItems.forEach((item, i) => {
        let x = i * (canvas.width / 3) + 20;
        ctx.drawImage(spriteSheet, item.sx, item.sy, item.sw, item.sh, x, canvas.height - 90, 60, 60);
        ctx.fillStyle = "white";
        ctx.fillText(`$${item.cost}`, x + 15, canvas.height - 10);
    });
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

window.addEventListener('resize', resize);
spriteSheet.onload = () => { resize(); gameLoop(); };
</script>
</body>
</html>
