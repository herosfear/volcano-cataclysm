<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volcano Cataclysm V10</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b1116; font-family: monospace; }
        #gameCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; touch-action: none; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; color: white; pointer-events: none; text-shadow: 2px 2px #000; }
        #debug-bar { color: #00ff00; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div style="font-size: 20px;">Gold: <span id="goldDisp">500</span></div>
        <div id="debug-bar">STATUS: Checking Files...</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const debugDisp = document.getElementById('debug-bar');

const spriteSheet = new Image();
// V10 FILENAME CHECK: Ensure this matches your GitHub file EXACTLY (case-sensitive)
spriteSheet.src = 'v10_volcano_master_atlas.PNG'; 

let gold = 500;
let gameActive = false; 
let towers = [];
let enemies = [];
let selectedTower = null;
let imgLoaded = false;

const path = [{x: -50, y: 250}, {x: 200, y: 250}, {x: 200, y: 500}, {x: 600, y: 500}];

const shopItems = [
    { type: 'Devil', sx: 5, sy: 50, sw: 95, sh: 85, cost: 250, color: 'red' },
    { type: 'Dart',  sx: 5, sy: 200, sw: 75, sh: 85, cost: 50, color: 'blue' },
    { type: 'Ice',   sx: 290, sy: 200, sw: 75, sh: 85, cost: 150, color: 'cyan' }
];

function log(msg) { debugDisp.innerText = "STATUS: " + msg; }

// --- Safety Timeout ---
setTimeout(() => {
    if (!imgLoaded) {
        log("IMAGE TIMEOUT - Using placeholder blocks");
        startEngine();
    }
}, 4000);

function startEngine() {
    resize();
    gameLoop();
}

// --- Input Handling ---
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const tx = e.touches[0].clientX;
    const ty = e.touches[0].clientY;

    if (!gameActive) {
        gameActive = true;
        log("BATTLE STARTED");
        return;
    }

    if (ty > window.innerHeight - 100) {
        let index = Math.floor(tx / (window.innerWidth / 3));
        if (shopItems[index] && gold >= shopItems[index].cost) {
            selectedTower = { ...shopItems[index], x: tx - 40, y: ty - 40 };
            log(`Holding ${selectedTower.type}`);
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (selectedTower) {
        e.preventDefault();
        selectedTower.x = e.touches[0].clientX - 40;
        selectedTower.y = e.touches[0].clientY - 40;
    }
}, { passive: false });

canvas.addEventListener('touchend', () => {
    if (selectedTower) {
        gold -= selectedTower.cost;
        towers.push({ ...selectedTower });
        log(`Placed! Gold: ${gold}`);
    }
    selectedTower = null;
}, { passive: false });

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Path
    ctx.strokeStyle = "#3a2a1d"; ctx.lineWidth = 50; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

    // 2. Towers
    towers.forEach(t => {
        if (imgLoaded) ctx.drawImage(spriteSheet, t.sx, t.sy, t.sw, t.sh, t.x, t.y, 80, 80);
        else { ctx.fillStyle = t.color; ctx.fillRect(t.x, t.y, 60, 60); }
    });

    // 3. Ghost
    if (selectedTower) {
        ctx.globalAlpha = 0.5;
        if (imgLoaded) ctx.drawImage(spriteSheet, selectedTower.sx, selectedTower.sy, selectedTower.sw, selectedTower.sh, selectedTower.x, selectedTower.y, 80, 80);
        else { ctx.fillStyle = selectedTower.color; ctx.fillRect(selectedTower.x, selectedTower.y, 60, 60); }
        ctx.globalAlpha = 1.0;
    }

    // 4. Shop
    ctx.fillStyle = "rgba(0,0,0,0.9)";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    shopItems.forEach((item, i) => {
        let x = i * (canvas.width / 3) + 20;
        if (imgLoaded) ctx.drawImage(spriteSheet, item.sx, item.sy, item.sw, item.sh, x, canvas.height - 90, 60, 60);
        else { ctx.fillStyle = item.color; ctx.fillRect(x, canvas.height - 80, 40, 40); }
    });

    if (!gameActive) {
        ctx.fillStyle = "orange"; ctx.textAlign = "center"; ctx.font = "20px Arial";
        ctx.fillText("TAP TO START", canvas.width/2, canvas.height/2);
    }
    document.getElementById('goldDisp').innerText = gold;
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function gameLoop() { draw(); requestAnimationFrame(gameLoop); }

spriteSheet.onload = () => { imgLoaded = true; log("ASSETS LOADED"); startEngine(); };
spriteSheet.onerror = () => { log("FILE ERROR: Check filename Case"); };
</script>
</body>
</html>
