<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volcano Cataclysm V10</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #0b1116; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #1a2a3a; margin: 0 auto; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #ffae00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px;">Gold: <span id="goldDisp">0</span></div>
        <div style="color: #ff4500;">Heat: <span id="heatDisp">0</span>%</div>
    </div>
    <div id="msg">TAP SCREEN TO START</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const spriteSheet = new Image();
spriteSheet.src = 'v10_volcano_master_atlas.PNG';

// --- Game Settings ---
let gameState = "START";
let gold = 0;
let frameCount = 0;

// --- Sprite Slicing Map (Adjusted for your sheet) ---
const sprites = {
    devil: { y: 55, w: 90, h: 90, frames: 6 },      // Row 1: Monkey Devil
    trio:  { y: 195, w: 90, h: 90, frames: 4 },     // Row 2: Legacy Trio
    sentry: { y: 465, w: 95, h: 95, frames: 6 },    // Row 3: Magma Sentry
    boss:  { y: 625, w: 125, h: 100, frames: 4 },   // Row 4: Dreadbloon
    boom:  { y: 805, w: 95, h: 95, frames: 5 }      // Row 5: Explosion
};

let player = { x: 150, y: 0, frame: 0, heat: 0 };
let boss = { x: 120, y: -150, hp: 1000, active: true };

function update() {
    if (gameState !== "PLAYING") return;

    frameCount++;
    if (frameCount % 10 === 0) player.frame = (player.frame + 1) % sprites.devil.frames;

    // Movement & Heat
    if (player.heat < 100) player.heat += 0.05;
    
    // Boss entry
    if (boss.y < 100) boss.y += 1;

    document.getElementById('goldDisp').innerText = gold;
    document.getElementById('heatDisp').innerText = Math.floor(player.heat);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === "START") {
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText("ASSETS LOADING...", canvas.width/2, canvas.height/2);
    }

    // Draw Monkey Devil (Slicing Row 1)
    ctx.drawImage(
        spriteSheet,
        player.frame * 96, sprites.devil.y, 85, 85,
        player.x, player.y, 100, 100
    );

    // Draw Dreadbloon (Slicing Row 4)
    if (boss.active) {
        let bossFrame = Math.floor(frameCount / 15) % sprites.boss.frames;
        ctx.drawImage(
            spriteSheet,
            bossFrame * 128, sprites.boss.y, 120, 100,
            boss.x, boss.y, 180, 150
        );
    }
}
// --- Game Objects ---
let towers = []; // Store placed monkeys
let selectedTower = null; // The one being dragged
let gold = 500;

const shopIcons = [
    { type: 'devil',  cost: 200, sx: 5,   sy: 50,  sw: 95, sh: 85 },
    { type: 'dart',   cost: 50,  sx: 5,   sy: 200, sw: 75, sh: 85 },
    { type: 'ice',    cost: 150, sx: 290, sy: 200, sw: 75, sh: 85 }
];

// --- Touch Interaction ---
window.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;

    // Check if touching the Shop Bar (Bottom of screen)
    if (ty > canvas.height - 100) {
        let index = Math.floor(tx / (canvas.width / 3));
        if (shopIcons[index] && gold >= shopIcons[index].cost) {
            selectedTower = { ...shopIcons[index], x: tx, y: ty, isDragging: true };
        }
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (selectedTower) {
        selectedTower.x = e.touches[0].clientX - 40;
        selectedTower.y = e.touches[0].clientY - 40;
    }
}, { passive: false });

window.addEventListener('touchend', () => {
    if (selectedTower) {
        gold -= selectedTower.cost;
        towers.push({ ...selectedTower, isDragging: false });
        selectedTower = null;
    }
});

// --- Updated Draw Loop ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Placed Towers
    towers.forEach(t => {
        ctx.drawImage(spriteSheet, t.sx, t.sy, t.sw, t.sh, t.x, t.y, 80, 80);
    });

    // 2. Draw Currently Dragged Tower
    if (selectedTower) {
        ctx.globalAlpha = 0.6;
        ctx.drawImage(spriteSheet, selectedTower.sx, selectedTower.sy, selectedTower.sw, selectedTower.sh, selectedTower.x, selectedTower.y, 80, 80);
        ctx.globalAlpha = 1.0;
    }

    // 3. Draw Shop UI Bar
    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    
    shopIcons.forEach((icon, i) => {
        let sectionWidth = canvas.width / 3;
        ctx.drawImage(spriteSheet, icon.sx, icon.sy, icon.sw, icon.sh, (i * sectionWidth) + 20, canvas.height - 90, 60, 60);
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText("$" + icon.cost, (i * sectionWidth) + 30, canvas.height - 10);
    });
}
    
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Mobile Resize
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height - 150;
    player.x = canvas.width / 2 - 50;
    boss.x = canvas.width / 2 - 90;
}

// Input to start
window.addEventListener('touchstart', () => {
    if (gameState === "START") {
        gameState = "PLAYING";
        document.getElementById('msg').style.display = 'none';
    }
});

window.addEventListener('resize', resize);
spriteSheet.onload = () => { resize(); gameLoop(); };

// Fallback if image fails
spriteSheet.onerror = () => {
    alert("Image not found! Make sure it's named v10_volcano_master_atlas.png");
};
</script>
</body>
</html>
